<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="tg.webp" type="image/x-icon">
    <title>iPhone Feedbacks</title>
</head>

<body>
    <div id="box">
        <!-- Status Bar Controls -->
        <div class="battery1"></div>
        <div class="battery2"></div>
        <div class="mob_time">4:25</div>
        
        <!-- Navigation Counters -->
        <div class="Personal">600</div>
        <div class="Channels">17</div>
        <div class="Unread">620</div>

        <!-- Dynamic Chat Lists (Injected via JS) -->
        <ul class="ul_chat_dp" id="chatDps"></ul>
        <ul class="ul_chat_name" id="chatNames"></ul>
        <ul class="ul_chat_time" id="chatTimes"></ul>
        <ul class="ul_msg_img" id="chatMessages"></ul>
        <ul class="ul_count_bullet" id="chatCounts"></ul>
        
        <!-- Bottom Tab Counters -->
        <div class="chats_counts">2.6K</div>
        <div class="settings_count">7</div>

        <!-- Main Background Image Interface -->
        <img src="https://logo-png-sigma.vercel.app/ifeed-thumb.jpeg" alt="Telegram Background" class="bg_img">
    </div>

    <!-- Action Bar Controls -->
    <div class="controls-bar">
        <label for="batteryInput">Battery (%):</label>
        <input type="number" id="batteryInput" value="13" min="1" max="100">
        <button class="btn" title="Download Screenshot" id="downloadBtn">
            <img src="https://raw.githubusercontent.com/ahmad-bhai/zeetex-currency-rate/0f914c89358480c47e3fdbb8a74f7020d938cf36/download.svg" alt="Download">
        </button>
    </div>

    <!-- External Libraries and Core Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="scripts.js"></script>
</body>

</html>
