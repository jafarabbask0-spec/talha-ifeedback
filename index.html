<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha Trader - Feedback System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="box">
        
        <div class="mob_time">04:25</div>
        
        <label for="battery-input">Battery:</label>
        <input type="number" id="battery-input" value="13" min="0" max="100">
        <div class="battery1"></div>
        <div class="battery2"></div>
        
        <button class="btn">
            <img src="https://img.icons8.com/material-rounded/24/000000/download.png" alt="Download">
        </button>

        <div class="Personal">600</div>
        <div class="Channels">17</div>
        <div class="Unread">620</div>

        <ul class="ul_chat_dp"></ul>
        <ul class="ul_chat_name"></ul>
        <ul class="ul_chat_time"></ul>
        <ul class="ul_msg_img"></ul>
        <ul class="ul_count_bullet"></ul>
        <ul class="ul_online_bullet"></ul>

        <div class="chats_counts">2.6K</div>
        <div class="settings_count">7</div>
        <img class="logo" src="talha.png" alt="Logo">

        <div class="hide1"></div>
        <div class="hide2"></div>
        <div class="hide3"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
